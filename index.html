<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DGS Sayaç</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
      position:relative;
    }

    /* ARKA PLAN FOTO */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url("blood.jpg") no-repeat center center;
      background-size:contain;
      background-color:black;
      z-index:-2;
    }

    /* KARARTMA */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    /* YAĞMUR GIF (EN ÜST KATMAN) */
    .rain{
      position:fixed;
      inset:0;
      background:url("rain.gif") no-repeat center center;
      background-size:cover;
      z-index:9999;
      pointer-events:none;
      opacity:0.35;
    }

    .timer{
      font-size:6vw;
      font-weight:bold;
      color:#38bdf8;
      text-shadow:0 0 20px rgba(56,189,248,0.6);
      line-height:1.4;
      user-select:none;
      z-index:10;
      position:relative;
    }

    @media(max-width:700px){
      .timer{ font-size:10vw; }
    }

  </style>
</head>

<body>

  <!-- YAĞMUR -->
  <div class="rain"></div>

  <!-- ARKA PLAN MÜZİK -->
  <audio id="bgMusic" autoplay loop muted>
    <source src="aynen.mp3" type="audio/mpeg">
  </audio>

  <div>
    <div class="timer" id="count">00:00:00:00</div>
  </div>

  <script>

    const examDate = new Date("2026-07-19T10:15:00").getTime();
    const el = document.getElementById("count");

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tickBeep(){
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.frequency.value = 800;
      gain.gain.value = 0.04;

      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }

    function update(){

      const now = new Date().getTime();
      const d = examDate - now;

      if(d <= 0){
        el.innerHTML = "SINAV BAŞLADI 🎉";
        return;
      }

      const days = Math.floor(d / (1000*60*60*24));
      const hours = Math.floor((d % (1000*60*60*24)) / (1000*60*60));
      const mins  = Math.floor((d % (1000*60*60)) / (1000*60));
      const secs  = Math.floor((d % (1000*60)) / 1000);

      el.innerHTML =
        String(days).padStart(2,'0') + " : " +
        String(hours).padStart(2,'0') + " : " +
        String(mins).padStart(2,'0') + " : " +
        String(secs).padStart(2,'0');

      tickBeep();
    }

    setInterval(update, 1000);
    update();

    const audio = document.getElementById("bgMusic");

    window.addEventListener("load", () => {
      audio.play().catch(()=>{});
      setTimeout(()=>{
        audio.muted = false;
        audio.volume = 0.4;
      },800);
    });

    document.body.addEventListener("click", () => {
      audio.muted = false;
      audio.volume = 0.4;
      audio.play().catch(()=>{});
    }, { once:true });

    window.addEventListener("click", () => {
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }, { once:true });

  </script>

</body>
</html>
